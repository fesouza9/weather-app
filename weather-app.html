<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clima</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="site-header" id="header">
    <section class="logo">
      <img src="assets/logo/logo.png" alt="Weather App Logo" width="60" height="60"/>
      <h1>Weather Now</h1>
    </section>

    <section class="config">
      <label for="units" class="unidades">Unidades:</label>
      <select id="units" aria-label="Config" onchange="buscarClima()">
        <option value="metric">°C, km/h</option>
        <option value="imperial">°F, mph</option>
      </select>
    </section>
  </header>

  <main class="container">
    
    <h1>Como está o céu hoje?</h1>

    <section class="search-row">
      <input id="input" type="text" placeholder="Digite uma cidade... ex: São Paulo" />
      <button onclick="buscarClima()" id="buscar">Buscar</button>
    </section>

    <aside class="error" id="error"></aside>
    <aside class="loading" id="loading">
      <div class="spinner"></div>
      <p>Buscando dados...</p>
    </aside>


    <section class="weather-grid" id="wth-grid">
      <section class="card weather-card" id="card">
        <aside class="weather-summary">
          <div class="weather-overview">
            <div class="weather-copy">
              <div class="city-name" id="city"></div>
              <div class="local-date" id="local-date"></div>
            </div>
          
            <div class="temp-row">
              <div class="description" id="desc"></div>
              <div class="weather-icon" id="icon">
                <img id="weather-icon" src="assets/images/icon-sunny.webp" alt="Weather Icon" width="50" height="50"/>
              </div>
              <div class="temp" id="temp"></div>
            </div>
          </div>
        </aside>

        <aside class="details">
          <div class="detail-item">
            <div class="detail-label">Sensação</div>
            <div class="detail-value" id="feels"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Umidade</div>
            <div class="detail-value" id="humidity"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Vento</div>
            <div class="detail-value" id="wind"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Visibilidade</div>
            <div class="detail-value" id="visibility"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">M&iacute;nima</div>
            <div class="detail-value" id="temp-min"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">M&aacute;xima</div>
            <div class="detail-value" id="temp-max"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Press&atilde;o</div>
            <div class="detail-value" id="pressure"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Nuvens</div>
            <div class="detail-value" id="clouds"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Nascer do sol</div>
            <div class="detail-value" id="sunrise"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">P&ocirc;r do sol</div>
            <div class="detail-value" id="sunset"></div>
          </div>
        </aside>
      </section>

      <!-- Previsão pelas próximas 20 horas -->
      <aside class="side-container">
        <section class="forecast-section" id="weekly-forecast-card">
          <article class="forecast-header">
            <div class="section-header">
              <p class="section-kicker">pr&oacute;ximas 20 horas</p>
              <span class="section-title"></span>
            </div>
          </article>
  
          <article class="hourly-forecast">
            <ul class="forecast-list" id="forecast-list">
              <li class="forecast-hour">
                <div class="forecast-time">12:00</div>
                <div class="forecast-icon">
                  <img src="assets/images/icon-sunny.webp" alt="Sunny Icon" width="30" height="30"/>
                </div>
                <div class="forecast-temp">25°</div>
              </li>
            </ul>

            <ul class="forecast-list" id="forecast-list">
              <li class="forecast-hour">
                <div class="forecast-time">13:00</div>
                <div class="forecast-icon">
                  <img src="assets/images/icon-sunny.webp" alt="Sunny Icon" width="30" height="30"/>
                </div>
                <div class="forecast-temp">25°</div>
              </li>
            </ul>

            <ul class="forecast-list" id="forecast-list">
              <li class="forecast-hour">
                <div class="forecast-time">14:00</div>
                <div class="forecast-icon">
                  <img src="assets/images/icon-sunny.webp" alt="Sunny Icon" width="30" height="30"/>
                </div>
                <div class="forecast-temp">25°</div>
              </li>
            </ul>

             <ul class="forecast-list" id="forecast-list">
              <li class="forecast-hour">
                <div class="forecast-time">15:00</div>
                <div class="forecast-icon">
                  <img src="assets/images/icon-sunny.webp" alt="Sunny Icon" width="30" height="30"/>
                </div>
                <div class="forecast-temp">25°</div>
              </li>
            </ul>

          </article>
        </section>
      </aside>

      <!-- Previsão do mesmo horário em cada dia da semana -->
      <article class="weekly-forecast-card" id="weekly-forecast-card">
        <p class="section-kicker">pr&oacute;ximos dias</p>
        <ul class="forecast-list" id="forecast-list">
          <li class="forecast-day">
            <section class="forecast-date">Segunda-feira</section>
            <div class="forecast-icon">
              <img src="assets/images/icon-sunny.webp" alt="Sunny Icon" width="30" height="30"/>
            </div>
            <div class="forecast-temp">25°/14°</div>
          </li>
        </ul>
      </article>
      
    </section>
  </main>



  <script src="script.js"></script>
</body>
</html>
