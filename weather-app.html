<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="20x20" href="assets/logo/logo.png" />
</head>
<body>
  <header class="site-header" id="header">
    <section class="logo" aria-label="Weather Now">
      <img src="assets/logo/logo.png" alt="Weather App Logo" width="60" height="60" />
      <h1>Weather Now</h1>
    </section>

    <section class="config">
      <label for="units" class="unidades">Unidades:</label>
      <select id="units" aria-label="Unidades">
        <option value="metric">&deg;C, km/h</option>
        <option value="imperial">&deg;F, mph</option>
      </select>

      
    </section>
  </header>

  <main class="container">
    <h1>Como est&aacute; o c&eacute;u hoje?</h1>

    <section class="search-row" aria-label="Buscar clima por cidade">
      <input id="input" type="text" placeholder="Digite uma cidade... ex: S&atilde;o Paulo" />
      <button type="button" id="buscar">Buscar</button>
    </section>

    <aside class="error" id="error"></aside>
    <aside class="loading" id="loading">
      <div class="spinner"></div>
      <p>Buscando dados...</p>
    </aside>

    <section class="weather-grid" id="wth-grid">
      <section class="card weather-card" id="card">
        <aside class="weather-summary">
          <div class="weather-overview">
            <div class="weather-copy">
              <div class="city-name" id="city"></div>
              <div class="local-date" id="local-date"></div>
            </div>

            <div class="temp-row">
              <div class="description" id="desc"></div>

              <!--
                Antes este elemento era uma <div> com um emoji escrito dentro.
                Agora e uma tag <img> de verdade: o atributo "src" comeca vazio
                e e preenchido pelo JavaScript (em renderizarClimaAtual, dentro
                de script.js), que coloca ali o caminho da imagem correta
                (ex: assets/images/chuva.png) dependendo do clima da cidade.
              -->
              <img class="weather-icon" id="icon" src="" alt="\u00cdcone do clima" />

              <div class="temp" id="temp"></div>
            </div>
          </div>
        </aside>

        <aside class="details">
          <div class="detail-item">
            <div class="detail-label">Sensa&ccedil;&atilde;o</div>
            <div class="detail-value" id="feels"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Umidade</div>
            <div class="detail-value" id="humidity"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Vento</div>
            <div class="detail-value" id="wind"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Visibilidade</div>
            <div class="detail-value" id="visibility"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">M&iacute;nima</div>
            <div class="detail-value" id="temp-min"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">M&aacute;xima</div>
            <div class="detail-value" id="temp-max"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Press&atilde;o</div>
            <div class="detail-value" id="pressure"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Nuvens</div>
            <div class="detail-value" id="clouds"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Nascer do sol</div>
            <div class="detail-value" id="sunrise"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">P&ocirc;r do sol</div>
            <div class="detail-value" id="sunset"></div>
          </div>
        </aside>
      </section>

      <aside class="side-container">
        <section class="forecast-section" id="hourly-forecast-section">
          <article class="forecast-header">
            <div class="section-header">
              <p class="section-kicker">pr&oacute;ximas 23 horas</p>
            </div>
          </article>

          <article class="hourly-forecast">
            <ul class="forecast-list" id="hourly-forecast-list"></ul>
          </article>
        </section>
      </aside>

      <section class="weekly-forecast-section">
        <section class="weekly-forecast" id="weekly-forecast-card">
          <div class="section-header">
            <p class="section-kicker">pr&oacute;ximos dias</p>
          </div>

          <ul class="hourly-list" id="weekly-forecast-list"></ul>
        </section>
      </section>
    </section>
  </main>
  
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
