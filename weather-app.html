<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clima</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="container">
    <h1>APP de Clima</h1>

    <h2>Como está o dia de hoje?</h2>

    <div class="search-row">
      <input id="input" type="text" placeholder="Digite uma cidade... ex: São Paulo" />
      <button onclick="buscarClima()" id="buscar">Buscar</button>
    </div>

    <div class="error" id="error"></div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Buscando dados...</p>
    </div>

    <section class="card weather-card" id="card">
      <aside class="weather-summary">
        <div class="weather-overview">
          <div class="weather-copy">
            <div class="city-name" id="city"></div>
            <div class="local-date" id="local-date"></div>
          </div>
          
          <div class="temp-row">
            <div class="temp" id="temp"></div>
            <div class="weather-icon" id="icon"></div>
            <div class="description" id="desc"></div>
          </div>
        </div>
      </aside>

      <div class="details">
        <div class="detail-item">
          <div class="detail-label">Sensação</div>
          <div class="detail-value" id="feels"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Umidade</div>
          <div class="detail-value" id="humidity"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Vento</div>
          <div class="detail-value" id="wind"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Visibilidade</div>
          <div class="detail-value" id="visibility"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">M&iacute;nima</div>
          <div class="detail-value" id="temp-min"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">M&aacute;xima</div>
          <div class="detail-value" id="temp-max"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Press&atilde;o</div>
          <div class="detail-value" id="pressure"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Nuvens</div>
          <div class="detail-value" id="clouds"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Nascer do sol</div>
          <div class="detail-value" id="sunrise"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">P&ocirc;r do sol</div>
          <div class="detail-value" id="sunset"></div>
        </div>
      </div>
    </section>

    <section class="forecast-section" id="forecast-card">
      <div class="section-header">
        <div>
          <p class="section-kicker">Hoje</p>
          <h2>Previs&atilde;o por hor&aacute;rio</h2>
        </div>
      </div>

      <div class="hourly-list" id="hourly-list"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
